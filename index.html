    <script>
      // Disable double-tap to zoom
      document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });
      // Disable pinch to zoom
      document.addEventListener('gesturestart', function (event) {
        event.preventDefault();
      });
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var progressPercent = document.querySelector("#unity-progress-percent");
      var loadingStartedAt = Date.now();
      var fakeLoadingProgress = 0;
      var fakeLoadingTimer = null;
      function setLoadingProgress(value) {
        var shownProgress = Math.max(0, Math.min(100, Math.round(value)));
        if (progressBarFull) progressBarFull.style.width = shownProgress + "%";
        if (progressPercent) progressPercent.textContent = shownProgress + "%";
      }
      function startLoadingScreen() {
        if (!loadingBar) return;
        loadingStartedAt = Date.now();
        fakeLoadingProgress = Math.max(fakeLoadingProgress, 2);
        loadingBar.style.display = "block";
        setLoadingProgress(fakeLoadingProgress);
        if (fakeLoadingTimer) clearInterval(fakeLoadingTimer);
        fakeLoadingTimer = setInterval(function(){
          if (fakeLoadingProgress < 88) {
            fakeLoadingProgress += fakeLoadingProgress < 35 ? 4 : 2;
            setLoadingProgress(fakeLoadingProgress);
          }
        }, 160);
      }
      function finishLoadingScreen() {
        if (fakeLoadingTimer) clearInterval(fakeLoadingTimer);
        fakeLoadingTimer = null;
        setLoadingProgress(100);
        var hideLoading = function(){ loadingBar.style.display = "none"; };
        var elapsedLoading = Date.now() - loadingStartedAt;
        setTimeout(hideLoading, Math.max(0, 2200 - elapsedLoading));
      }
      startLoadingScreen();
      var initialize = async() =>{
        var unityCanvas = document.querySelector("#unity-canvas");
        var videoCanvas = document.querySelector("#video-canvas");
        window.arCamera = new ARCamera(unityCanvas, videoCanvas);
        window.iTracker = new ImageTracker(arCamera);
        try{
            await window.iTracker.initialize("./opencv.js");
            console.log("ImageTracker initialized!");
        }
        catch{
            console.error("Failed to initialize ImageTracker. Are you missing opencv.js? " + error);
            ShowError("Failed to initialize the experience.");
            return;
        }
        await LoadWebcams();
        
        window.permissionsGranted = await IsCameraPermissionGranted();
        StartAR();
      }
      initialize();
            window.addEventListener("error", function(event) {
        var msg = String((event && (event.message || event.error)) || "");
        var src = String((event && event.filename) || "");
        if (msg.indexOf("6780040") !== -1 || src.indexOf("opencv.js") !== -1) {
          console.warn("Suppressed transient iTracker/OpenCV error:", msg, src);
          event.preventDefault();
          return true;
        }
      }, true);
      window.onerror = function(message, source) {
        var msg = String(message || "");
        var src = String(source || "");
        if (msg.indexOf("6780040") !== -1 || src.indexOf("opencv.js") !== -1) {
          console.warn("Suppressed transient iTracker/OpenCV error:", msg, src);
          return true;
        }
        return false;
      };

            window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((reg) => reg.unregister()));
        }
      });
      var warningBanner = document.querySelector("#unity-warning");
      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }
      function StartAR() {
        var startARDiv = document.querySelector("#startARDiv");
        startARDiv.style.opacity = 0;
        setTimeout(()=>{
          startARDiv.style.display = "none";
        }, 500);
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/.deploy-WebAR_Test.loader.js";
        var config = {
          dataUrl: buildUrl + "/.deploy-WebAR_Test.data.unityweb",
          frameworkUrl: buildUrl + "/.deploy-WebAR_Test.framework.js.unityweb",
          codeUrl: buildUrl + "/.deploy-WebAR_Test.wasm.unityweb",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "DefaultCompany",
          productName: "Imagine WebAR",
          productVersion: "0.1.0",
          showBanner: unityShowBanner,
        };
        // By default Unity keeps WebGL canvas render target size matched with
        // the DOM size of the canvas element (scaled by window.devicePixelRatio)
        // Set this to false if you want to decouple this synchronization from
        // happening inside the engine, and you would instead like to size up
        // the canvas DOM size and WebGL render target sizes yourself.
        // config.matchWebGLToCanvasSize = false;
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          // Mobile device style: fill the whole browser client area with the game canvas:
          var meta = document.createElement('meta');
          meta.name = 'viewport';
          meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
          document.getElementsByTagName('head')[0].appendChild(meta);
        }
        startLoadingScreen();
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            fakeLoadingProgress = Math.max(fakeLoadingProgress, progress * 100);
            setLoadingProgress(fakeLoadingProgress);
          }).then((unityInstance) => {
                        finishLoadingScreen();

            window.unityInstance = unityInstance;
            var voicePanel = document.querySelector("#voicePanel");
            if (voicePanel) voicePanel.style.display = "flex";
            RequestWebcam();
          }).catch((message) => {
            var text = String(message || "");
            if (text.indexOf("6780040") !== -1 || text.indexOf("opencv.js") !== -1) {
              console.warn("Suppressed transient iTracker/OpenCV runtime error:", text);
              return;
            }
            alert(message);
          });
        };
        document.body.appendChild(script);
      }

      window.WEBCAM_SETTINGS = {

              facingMode: unityFacingMode,
          },
          audio: true
      };
      window.requestingForPermissions = false;
      window.preGrantedAudioStream = null;
      async function RequestWebcam(){
          window.requestingForPermissions = true;
          try{
              window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
              console.log("Webcam and microphone access granted");
              var audioTracks = window.webcamStream.getAudioTracks ? window.webcamStream.getAudioTracks() : [];
              if (audioTracks.length) window.preGrantedAudioStream = new MediaStream(audioTracks);
              requestingForPermissions = false;
              // Release the camera preview stream now, but keep the audio permission stream for voice input reuse.
              StopWebcam();
          }
          catch (err) {
              //user denied camera permission - show error panel
              console.error("getUserMedia error - " , err);
              ShowError("???????????????????");
              window.requestingForPermissions = false;
          }           
      }
      function StopWebcam(){
          console.log("stopping camera");
          if (!window.webcamStream) return;
          window.webcamStream.getVideoTracks().forEach(track => track.stop());
          // Keep audio tracks alive in window.preGrantedAudioStream so the record button does not trigger another permission prompt.
      }
      async function StartWebcam(){
          console.log("StartWebcam")
          window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
          while (window.requestingForPermissions) {
              // Wait until requestingForPermissions becomes true.
              console.log("Waiting for permissions...");
              await new Promise(resolve => setTimeout(resolve, 100)); // Adjust the delay time as needed.
          }
          console.log("Got Permissions");
          if(window.webcamStream)
          {
              const video = document.querySelector("#webcam-video");
              video.srcObject = webcamStream;
              try {
                  await arCamera.startWebcam(video);
                  console.log("Webcam started successfully");
                  window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamSuccess');
                 
                  //replace background transparency
                  const canvas = document.querySelector("#unity-canvas");
                  let bgColor = window.getComputedStyle(canvas).backgroundColor;
                  canvas.style.background = bgColor.replace("rgb", "rgba").replace(")", ", 0)");
                  
              }
              catch(err){
                  console.error("Webcam failed to start - ", err);
                  window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
              }   
          }
          else{
              console.error("Webcam failed to start - permission not yet granted");
              window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
          }  
      }
      async function LoadWebcams(){
          let camDevices = [];
          // let backCams = [];
          let devices = await navigator.mediaDevices.enumerateDevices();
          var ctr = 0;
          devices.forEach(mediaDevice => {
              if (mediaDevice.kind === 'videoinput') {
                  if(window.unityFacingMode == 'environment' && !mediaDevice.label.includes('facing front')){
                      //back cam only
                      camDevices.push(mediaDevice);
                  }
                  else if(window.unityFacingMode == 'user' && mediaDevice.label.includes('facing front')){
                      //front cam only
                      camDevices.push(mediaDevice);
                  }
                  else{
                      //back and front
                      camDevices.push(mediaDevice);
                  }   
                  
                  ctr++;
              }
          });
          var select = document.getElementById("chooseCamSel");
          select.style.display = "";
          var count = 0;
          //reverse array because some Android phones can't distinguish front and back cams at first load
          //and when this happens, most of the time, front cam goes first and back cam goes last
          camDevices = camDevices.reverse();
          camDevices.forEach(mediaDevice => {
              const option = document.createElement('option');
              option.value = mediaDevice.deviceId;
              let label = `Camera ${count}`;
              if (mediaDevice.label) {
                  label = mediaDevice.label
              }
              const textNode = document.createTextNode(label);
              option.appendChild(textNode);
              select.appendChild(option);
              count++;
          });
          iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
      }
      function SelectCam(){
          var select = document.getElementById("chooseCamSel");
          window.deviceId = select.value;
          window.WEBCAM_SETTINGS.video['deviceId'] = deviceId;
          //console.log(window.WEBCAM_SETTINGS);
          iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
      }
      async function FlipCam(){
          arCamera.stopWebcam();
          window.WEBCAM_SETTINGS.video.deviceId = '';
          if(window.WEBCAM_SETTINGS.video.facingMode == 'user'){
              window.WEBCAM_SETTINGS.video.facingMode = 'environment';
              arCamera.setFlipped(false);
          }
          else{
              window.WEBCAM_SETTINGS.video.facingMode = 'user';
              arCamera.setFlipped(true);
          }
          window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
          const video = document.querySelector("#webcam-video");
          video.srcObject = webcamStream;
          await arCamera.startWebcam(video);
      }
      async function IsCameraPermissionGranted() {
          if (!navigator.permissions || !navigator.mediaDevices) {
              console.log("Permissions API or mediaDevices not supported.");
              return false;
          }
          try {
              // Query the status of the camera permission
              const permissionStatus = await navigator.permissions.query({ name: "camera" });
              if (permissionStatus.state === "granted") {
              console.log("Camera permission has already been granted.");
              return true;
              } else if (permissionStatus.state === "prompt") {
              console.log("Camera permission is promptable.");
              return false;
              } else {
              console.log("Camera permission has been denied.");
              return false;
              }
          } catch (error) {
              console.log("Error checking camera permission:", error);
              return false;
          }
      }
      function ShowError(error){
          var errorDiv = document.getElementById("errorDiv");
          errorDiv.style.opacity = 1;
          errorDiv.style.display = "";
          document.getElementById("errorText").innerHTML = error;
      }
      function ShowScreenshot(dataUrl){
          var screenshotDiv = document.getElementById("screenshotDiv");
          screenshotDiv.style.opacity = 1;
          screenshotDiv.style.display = "";
          document.getElementById("screenshotImg").src = dataUrl;
          document.getElementById("screenshotImg").style.width = "80vw";
          document.getElementById("screenshotImg").style.height = 80 / window.innerWidth * window.innerHeight + "vw";
      }

          var screenshotDiv = document.getElementById('screenshotDiv');
          screenshotDiv.style.opacity = 0;
          setTimeout(()=>{

          }, 500);
      }
